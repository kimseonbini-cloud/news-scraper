name: EMR News Scraper

# 언제 실행할지 (트리거)
on:
  schedule:
    # 매일 새벽 1시(UTC 기준, 한국시간 오전 10시)
    - cron: '0 1 * * *'
  
  # 수동 실행 버튼
  workflow_dispatch:

# 실행할 작업들
jobs:
  scrape:
    runs-on: ubuntu-latest  # Ubuntu 서버에서 실행
    
    steps:
      # 1단계: 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2단계: Python 설치
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      
      # 3단계: 필요한 패키지 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4단계: 스크래핑 실행
      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python news_scraper.py
      
      # 5단계: 결과 저장 (Git에 커밋)
      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update EMR news data" && git push)