name: Inohas News Scraper

on:
  # 외부 트리거
  repository_dispatch:
    types: [trigger-inohas-scraper]

  # 수동 실행 버튼
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: news-scraper-inohas
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==23.3.1
          pip install --no-cache-dir -r requirements.txt

      - name: Verify installations
        run: |
          python -c "import openai; print(f'OpenAI version: {openai.__version__}')"
          python -c "import httpx; print(f'HTTPX version: {httpx.__version__}')"

      - name: Sync latest main before scraping
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Verify environment variables
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_SELECTOR_MODEL: ${{ secrets.OPENAI_SELECTOR_MODEL }}
          SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
          EMAIL_INSIGHT_MODEL: ${{ secrets.EMAIL_INSIGHT_MODEL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_RECEIVER_ECONOMY: ${{ secrets.EMAIL_RECEIVER_ECONOMY }}
          EMAIL_RECEIVER_INOHAS: ${{ secrets.EMAIL_RECEIVER_INOHAS }}
        run: |
          python - <<'PY'
          import os

          keys = [
              "NAVER_CLIENT_ID",
              "NAVER_CLIENT_SECRET",
              "OPENAI_API_KEY",
              "OPENAI_MODEL",
              "OPENAI_SELECTOR_MODEL",
              "SUMMARY_MODEL",
              "EMAIL_INSIGHT_MODEL",
              "EMAIL_SENDER",
              "EMAIL_PASSWORD",
              "EMAIL_RECEIVER",
              "EMAIL_RECEIVER_ECONOMY",
              "EMAIL_RECEIVER_INOHAS",
          ]

          for key in keys:
              print(f"{key}: {'SET' if os.getenv(key) else 'MISSING'}")
          PY

      - name: Run inohas scraper
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_SELECTOR_MODEL: ${{ secrets.OPENAI_SELECTOR_MODEL }}
          SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
          EMAIL_INSIGHT_MODEL: ${{ secrets.EMAIL_INSIGHT_MODEL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_RECEIVER_ECONOMY: ${{ secrets.EMAIL_RECEIVER_ECONOMY }}
          EMAIL_RECEIVER_INOHAS: ${{ secrets.EMAIL_RECEIVER_INOHAS }}
        run: python main.py --config configs/inohas_briefing.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add data/state docs

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update inohas news [$(date +'%Y-%m-%d %H:%M:%S')]"

          for i in 1 2 3; do
            git fetch origin main

            if ! git rebase origin/main; then
              echo "Rebase conflict occurred. Abort rebase."
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed. Retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
