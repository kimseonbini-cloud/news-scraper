name: Company News Scraper

on:
  # 외부 트리거
  repository_dispatch:
    types: [trigger-company-scraper]

  # 수동 실행 버튼
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-scraper-main
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==23.3.1
          pip install --no-cache-dir -r requirements.txt

      - name: Verify installations
        run: |
          python -c "import openai; print(f'OpenAI version: {openai.__version__}')"
          python -c "import httpx; print(f'HTTPX version: {httpx.__version__}')"

      - name: Run company scraper
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python main.py --config configs/company_briefing.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update company news [$(date +'%Y-%m-%d %H:%M:%S')]"

          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed. Retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1